name: node-example
description: >
  Example Node.js MCP server generated by mcp-factory.
  Demonstrates the node runtime template with @modelcontextprotocol/sdk.

runtime:
  type: node
  command: "node"
  output: "generated/node_example_server.js"

tools:
  - name: ping
    description: "Returns a pong message with optional echo text."
    args:
      - name: message
        type: string
        required: false
        description: "Text to echo back"

  - name: get_status
    description: "Return server status and uptime."
    args: []

  - name: echo_json
    description: "Return the input as structured JSON."
    args:
      - name: payload
        type: object
        required: true
        description: "JSON object to echo"

tags:
  - node
  - example
  - template-demo
