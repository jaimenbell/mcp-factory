name: fastmcp-example
description: >
  Example FastMCP-style Python MCP server generated by mcp-factory.
  Demonstrates the python/fastmcp runtime style — same manifest contract
  as the raw-SDK python template, different generated framework.

runtime:
  type: python
  command: "python"
  style: fastmcp
  output: "generated/fastmcp_example_server.py"

tools:
  - name: ping
    description: "Returns a pong message with optional echo text."
    args:
      - name: message
        type: string
        required: false
        description: "Text to echo back"

  - name: get_status
    description: "Return server status and uptime."
    args: []

  - name: echo_json
    description: "Return the input as structured JSON."
    args:
      - name: payload
        type: object
        required: true
        description: "JSON object to echo"

env_required:
  - EXAMPLE_API_KEY

tags:
  - python
  - fastmcp
  - example
  - template-demo
